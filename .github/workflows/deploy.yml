name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "ahsoka/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --extra dev
      - run: uv run pytest

  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude '*.session' \
            --exclude '*.session-journal' \
            --exclude 'ahsoka.db' \
            --exclude '.venv/' \
            --exclude '__pycache__/' \
            --exclude '.git/' \
            ./ ahsoka@${{ secrets.DEPLOY_HOST }}:/home/ahsoka/ahsoka/

      - name: Inject secrets into .env
        env:
          DOTENV: |
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            LOG_BOT_TOKEN=${{ secrets.LOG_BOT_TOKEN }}
            OWNER_CHAT_ID=${{ secrets.OWNER_CHAT_ID }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
            TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
            CLAUDE_MODEL=${{ vars.CLAUDE_MODEL }}
            DEFAULT_SCORE_THRESHOLD=${{ vars.DEFAULT_SCORE_THRESHOLD }}
        run: |
          printf '%s\n' "$DOTENV" | grep -v '=$' \
            | ssh ahsoka@${{ secrets.DEPLOY_HOST }} "cat > /home/ahsoka/ahsoka/.env"

      - name: Install deps and restart service
        run: |
          ssh ahsoka@${{ secrets.DEPLOY_HOST }} "
            sudo apt-get install -y --no-install-recommends build-essential python3-dev &&
            sudo chown -R ahsoka:ahsoka /home/ahsoka/ahsoka &&
            cd /home/ahsoka/ahsoka &&
            /home/ahsoka/.local/bin/uv sync --locked &&
            sudo systemctl restart ahsoka &&
            sudo systemctl is-active --quiet ahsoka && echo 'ahsoka is running'
          "
