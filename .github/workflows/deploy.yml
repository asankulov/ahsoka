name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --extra dev
      - run: uv run pytest

  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude '*.session' \
            --exclude '*.session-journal' \
            --exclude 'ahsoka.db' \
            --exclude '.venv/' \
            --exclude '__pycache__/' \
            --exclude '.git/' \
            ./ ahsoka@${{ secrets.DEPLOY_HOST }}:/home/ahsoka/ahsoka/

      - name: Inject secrets into .env
        run: |
          ssh ahsoka@${{ secrets.DEPLOY_HOST }} "
            cd /home/ahsoka/ahsoka &&
            touch .env &&
            grep -q '^LOG_BOT_TOKEN=' .env \
              && sed -i 's|^LOG_BOT_TOKEN=.*|LOG_BOT_TOKEN=8501917593:AAFtZUQas6CZijwh9tqV3Rj092_AE20H9zw|' .env \
              || echo 'LOG_BOT_TOKEN=8501917593:AAFtZUQas6CZijwh9tqV3Rj092_AE20H9zw' >> .env
          "

      - name: Install deps and restart service
        run: |
          ssh ahsoka@${{ secrets.DEPLOY_HOST }} "
            sudo apt-get install -y --no-install-recommends build-essential python3-dev &&
            sudo chown -R ahsoka:ahsoka /home/ahsoka/ahsoka &&
            cd /home/ahsoka/ahsoka &&
            /home/ahsoka/.local/bin/uv sync --locked &&
            sudo systemctl restart ahsoka &&
            sudo systemctl is-active --quiet ahsoka && echo 'ahsoka is running'
          "
